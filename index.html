<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roller Coaster Runner - Fizz's Magic Adventure</title>
    <style>
        :root {
            --primary-pink: #ff69b4;
            --primary-purple: #9370db;
            --primary-blue: #00bfff;
            --primary-yellow: #ffd700;
            --accent-green: #7cfc00;
            --bg-color: #f0f8ff;
            --text-color: #333;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background-color: #87CEEB; /* Sky blue default */
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 90%;
            width: 450px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-pink);
            text-shadow: 3px 3px 0px white, 6px 6px 0px rgba(0,0,0,0.1);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-purple));
            border: none;
            border-radius: 50px;
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
        }

        .hud-item {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-purple);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-val {
            font-size: 1.8rem;
            color: var(--primary-pink);
        }

        /* Customization */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .shop-item {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid transparent;
            position: relative;
        }

        .shop-item.active {
            border-color: var(--primary-yellow);
            background: #fff9e6;
        }

        .shop-item.locked::after {
            content: '🔒';
            position: absolute;
            font-size: 1.5rem;
        }

        /* Speed Emoji Indicator */
        #speed-o-meter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 4rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .btn { font-size: 1.2rem; padding: 12px 30px; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="hidden">
        <div class="hud-item">
            <span>🍬</span>
            <span id="score-display" class="score-val">0</span>
        </div>
        <div class="hud-item">
            <span>📏</span>
            <span id="distance-display">0m</span>
        </div>
    </div>

    <div id="speed-o-meter" class="hidden">😊</div>

    <!-- Main Menu -->
    <div id="menu-overlay" class="overlay">
        <div class="card">
            <h1>Fizz's Adventure</h1>
            <p>Ready for a magical roller coaster ride?</p>
            <button class="btn" id="start-btn">PLAY!</button>
            <button class="btn btn-secondary" id="shop-btn">WARDROBE</button>
            <p style="font-size: 0.8rem; margin-top: 20px; color: #888;">Tap/Space to Jump • Hold to Glide</p>
        </div>
    </div>

    <!-- Shop Overlay -->
    <div id="shop-overlay" class="overlay hidden">
        <div class="card">
            <h1>Wardrobe</h1>
            <div id="currency-display" style="font-weight: bold; color: var(--primary-pink); margin-bottom: 10px;">🍬 0 Candies</div>
            <div class="shop-grid">
                <!-- Hats -->
                <div class="shop-item" data-type="hat" data-id="none" title="No Hat">❌</div>
                <div class="shop-item" data-type="hat" data-id="party" title="Party Hat">🥳</div>
                <div class="shop-item" data-type="hat" data-id="crown" title="Crown">👑</div>
                <!-- Cart Colors -->
                <div class="shop-item" data-type="cart" data-id="red" style="background-color: #ff4d4d;"></div>
                <div class="shop-item" data-type="cart" data-id="blue" style="background-color: #4d94ff;"></div>
                <div class="shop-item" data-type="cart" data-id="rainbow" style="background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);"></div>
            </div>
            <button class="btn btn-secondary" id="back-btn" style="margin-top: 30px;">BACK</button>
        </div>
    </div>

    <!-- Results/Finish Overlay -->
    <div id="results-overlay" class="overlay hidden">
        <div class="card">
            <h1>Great Job!</h1>
            <p id="final-score">You collected 0 candies!</p>
            <p id="final-distance">You traveled 0 meters!</p>
            <button class="btn" id="replay-btn">PLAY AGAIN</button>
            <button class="btn btn-secondary" id="menu-btn">MENU</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="overlay hidden">
        <div class="card" style="border-color: #ff4d4d;">
            <h1 style="color: #ff4d4d;">WHOOPS!</h1>
            <p style="font-size: 1.5rem; font-weight: bold;">You fell off the track!</p>
            <p id="game-over-stats">Score: 0 • Distance: 0m</p>
            <button class="btn" id="game-over-replay-btn">TRY AGAIN</button>
            <button class="btn btn-secondary" id="game-over-menu-btn">MENU</button>
        </div>
    </div>
</div>

<script>
/**
 * ROLLER COASTER RUNNER
 * A Kid-Friendly Endless Runner
 */

const CONFIG = {
    gravity: 0.6,
    jumpForce: -12,
    doubleJumpForce: -10,
    glideForce: 0.3,
    baseScrollSpeed: 5,
    maxScrollSpeed: 12,
    speedDifficultyFactor: 0.00005,
    colors: {
        fizz: '#9370db',
        track: '#ff69b4',
        trackShadow: '#d4478d',
        sky: '#87CEEB'
    }
};

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.state = 'MENU';
        this.score = 0;
        this.distance = 0;
        this.scrollSpeed = CONFIG.baseScrollSpeed;
        this.isSlowedDown = false;
        this.slowEffectTimer = 0;
        
        this.setupEventListeners();
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        this.player = new Player(this);
        this.track = new Track(this);
        this.background = new Background(this);
        this.sound = new SoundManager();
        this.entities = [];
        this.particles = [];
        this.screenShake = 0;
        
        // Persistence
        this.candyCount = parseInt(localStorage.getItem('fizz_candy')) || 0;
        this.starCoins = parseInt(localStorage.getItem('fizz_stars')) || 0;
        this.highScore = parseInt(localStorage.getItem('fizz_highscore')) || 0;
        this.unlockedItems = JSON.parse(localStorage.getItem('fizz_unlocked')) || ['hat-none', 'cart-red'];
        this.equipped = JSON.parse(localStorage.getItem('fizz_equipped')) || { hat: 'none', cart: 'red' };
        
        this.milestonesReached = 0;

        this.updateShopUI();

        this.lastTime = performance.now();
        this.accumulator = 0;
        this.timeStep = 1000 / 60;

        this.animationId = requestAnimationFrame((t) => this.gameLoop(t));
        console.log("Game initialized");
    }

    setupEventListeners() {
        const startBtn = document.getElementById('start-btn');
        const shopBtn = document.getElementById('shop-btn');
        const backBtn = document.getElementById('back-btn');
        const replayBtn = document.getElementById('replay-btn');
        const menuBtn = document.getElementById('menu-btn');

        startBtn.onclick = () => this.startGame();
        shopBtn.onclick = () => this.showOverlay('shop-overlay');
        backBtn.onclick = () => this.showOverlay('menu-overlay');
        replayBtn.onclick = () => this.startGame();
        menuBtn.onclick = () => this.showOverlay('menu-overlay');

        const gameOverReplayBtn = document.getElementById('game-over-replay-btn');
        const gameOverMenuBtn = document.getElementById('game-over-menu-btn');
        gameOverReplayBtn.onclick = () => this.startGame();
        gameOverMenuBtn.onclick = () => this.showOverlay('menu-overlay');

        // Add Finish Button in HUD
        const finishBtn = document.createElement('div');
        finishBtn.className = 'hud-item';
        finishBtn.style.pointerEvents = 'auto';
        finishBtn.style.cursor = 'pointer';
        finishBtn.innerHTML = '🏁 Finish';
        finishBtn.onclick = () => this.finishRun();
        document.getElementById('hud').appendChild(finishBtn);

        // Add Pause Button in HUD
        const pauseBtn = document.createElement('div');
        pauseBtn.className = 'hud-item';
        pauseBtn.style.pointerEvents = 'auto';
        pauseBtn.style.cursor = 'pointer';
        pauseBtn.id = 'pause-btn';
        pauseBtn.innerHTML = '⏸️ Pause';
        pauseBtn.onclick = () => this.togglePause();
        document.getElementById('hud').appendChild(pauseBtn);

        // Shop Item Clicks
        document.querySelectorAll('.shop-item').forEach(item => {
            item.onclick = (e) => this.handleShopClick(e.target);
        });

        // Input handling
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                this.handleActionStart();
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                this.handleActionEnd();
            }
        });

        this.canvas.addEventListener('mousedown', () => this.handleActionStart());
        this.canvas.addEventListener('mouseup', () => this.handleActionEnd());
        this.canvas.addEventListener('touchstart', (e) => {
            this.handleActionStart();
            e.preventDefault();
        }, { passive: false });
        this.canvas.addEventListener('touchend', () => this.handleActionEnd());
    }

    handleActionStart() {
        if (this.state === 'PLAYING') {
            this.player.jump();
        }
    }

    handleActionEnd() {
        if (this.state === 'PLAYING') {
            this.player.releaseJump();
        }
    }

    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        
        // Adjust values based on screensize if needed
        if (this.player) this.player.resize();
    }

    showOverlay(id) {
        document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        if (id === 'menu-overlay') {
            this.state = 'MENU';
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('speed-o-meter').classList.add('hidden');
        } else if (id === 'shop-overlay') {
            this.state = 'CUSTOMIZE';
        } else if (id === 'results-overlay') {
            this.state = 'RESULTS';
            document.getElementById('final-score').innerText = `You collected ${Math.floor(this.score)} candies!`;
            document.getElementById('final-distance').innerText = `You traveled ${Math.floor(this.distance)} meters!`;
        } else if (id === 'game-over-overlay') {
            this.state = 'GAME_OVER';
            document.getElementById('game-over-stats').innerText = `Score: ${Math.floor(this.score)} • Distance: ${Math.floor(this.distance)}m`;
        }
    }

    startGame() {
        this.state = 'PLAYING';
        this.score = 0;
        this.distance = 0;
        this.milestonesReached = 0;
        this.scrollSpeed = CONFIG.baseScrollSpeed;
        this.entities = [];
        this.particles = [];
        this.isSlowedDown = false;
        this.slowEffectTimer = 0;
        this.screenShake = 0;
        this.player.reset();
        this.track.reset();
        this.background.initLayers();
        
        document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('speed-o-meter').classList.remove('hidden');

        // Show Tutorial briefly
        const msg = document.createElement('div');
        msg.style.position = 'absolute';
        msg.style.top = '50%';
        msg.style.width = '100%';
        msg.style.textAlign = 'center';
        msg.style.fontSize = '2rem';
        msg.style.color = 'white';
        msg.style.textShadow = '2px 2px 4px rgba(0,0,0,0.5)';
        msg.style.transition = 'opacity 1s';
        msg.innerHTML = 'TAP TO JUMP!<br>HOLD TO GLIDE!';
        document.body.appendChild(msg);
        setTimeout(() => { msg.style.opacity = '0'; setTimeout(() => msg.remove(), 1000); }, 2000);
    }

    togglePause() {
        if (this.state === 'PLAYING') {
            this.state = 'PAUSED';
            document.getElementById('pause-btn').innerHTML = '▶️ Resume';
        } else if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            document.getElementById('pause-btn').innerHTML = '⏸️ Pause';
        }
    }

    finishRun() {
        if (this.distance > this.highScore) {
            this.highScore = Math.floor(this.distance);
            localStorage.setItem('fizz_highscore', this.highScore);
        }
        localStorage.setItem('fizz_candy', this.candyCount);
        this.showOverlay('results-overlay');
    }

    gameOver() {
        if (this.state === 'GAME_OVER') return;
        this.sound.play('slowdown');
        this.finishRun(); // Saves stats
        this.showOverlay('game-over-overlay');
    }

    handleShopClick(el) {
        const type = el.dataset.type;
        const id = el.dataset.id;
        const itemKey = `${type}-${id}`;

        if (this.unlockedItems.includes(itemKey)) {
            this.equipped[type] = id;
            localStorage.setItem('fizz_equipped', JSON.stringify(this.equipped));
            this.updateShopUI();
        } else {
            // Logic for buying with candy/stars
            const cost = 50; // Placeholder
            if (this.candyCount >= cost) {
                this.candyCount -= cost;
                this.unlockedItems.push(itemKey);
                this.equipped[type] = id;
                localStorage.setItem('fizz_candy', this.candyCount);
                localStorage.setItem('fizz_unlocked', JSON.stringify(this.unlockedItems));
                localStorage.setItem('fizz_equipped', JSON.stringify(this.equipped));
                this.updateShopUI();
                this.sound.play('powerup');
            }
        }
    }

    updateShopUI() {
        document.querySelectorAll('.shop-item').forEach(item => {
            const type = item.dataset.type;
            const id = item.dataset.id;
            const itemKey = `${type}-${id}`;
            
            item.classList.toggle('active', this.equipped[type] === id);
            item.classList.toggle('locked', !this.unlockedItems.includes(itemKey));
        });
        document.getElementById('currency-display').innerText = `🍬 ${this.candyCount} Candies`;
        document.getElementById('score-display').innerText = Math.floor(this.score);
    }

    gameLoop(timestamp) {
        const deltaTime = timestamp - this.lastTime;
        this.lastTime = timestamp;

        if (this.state === 'PLAYING') {
            const dt = Math.min(deltaTime, 100) / 1000; // Cap dt to avoid huge jumps
            this.update(dt);
        }
        
        this.draw();
        this.animationId = requestAnimationFrame((t) => this.gameLoop(t));
    }

    update(dt) {
        // Handle Slowdown
        if (this.isSlowedDown) {
            this.slowEffectTimer -= dt;
            if (this.slowEffectTimer <= 0) {
                this.isSlowedDown = false;
            }
        }

        const targetSpeed = this.isSlowedDown ? CONFIG.baseScrollSpeed * 0.7 : Math.min(CONFIG.maxScrollSpeed, CONFIG.baseScrollSpeed + this.distance * CONFIG.speedDifficultyFactor);
        this.scrollSpeed += (targetSpeed - this.scrollSpeed) * 0.1;

        this.distance += this.scrollSpeed * dt;
        
        this.background.update(dt);
        this.track.update(dt);
        this.player.update(dt);

        // UI Updates
        document.getElementById('score-display').innerText = Math.floor(this.score);
        document.getElementById('distance-display').innerText = Math.floor(this.distance) + 'm';
        
        // Milestones
        const nextMilestone = (this.milestonesReached + 1) * 500;
        if (this.distance >= nextMilestone) {
            this.milestonesReached++;
            this.spawnParticles(this.width/2, this.height/2, '#ff69b4', 50);
            this.sound.play('powerup');
            // Give bonus candy
            this.candyCount += 50;
            this.updateShopUI();
        }

        // Speed Indicator
        const speedEmoji = document.getElementById('speed-o-meter');
        if (this.isSlowedDown) speedEmoji.innerText = '😲';
        else if (this.scrollSpeed > 10) speedEmoji.innerText = '😃';
        else speedEmoji.innerText = '😊';

        // Update entities
        for (let i = this.entities.length - 1; i >= 0; i--) {
            const e = this.entities[i];
            e.update(dt);
            
            if (this.checkCollision(this.player, e)) {
                e.onCollect();
                this.entities.splice(i, 1);
            } else if (e.x + 200 < 0) { // Off screen
                this.entities.splice(i, 1);
            }
        }

        // Update particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(dt);
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        // Spawn entities
        this.spawnManager(dt);
    }

    spawnManager(dt) {
        if (dt === 0) return;
        const spawnChance = 0.02 + (this.distance / 5000) * 0.03;
        if (Math.random() < spawnChance) {
            let type = 'candy';
            const r = Math.random();
            if (r < 0.6) type = 'candy';
            else if (r < 0.8) type = 'balloon';
            else if (r < 0.95) type = 'obstacle';
            else type = 'ticket';

            const x = this.width + 100;
            const y = this.track.getYAt(x) - 50 - Math.random() * 150;
            this.entities.push(new Entity(this, x, y, type));
        }
    }

    draw() {
        this.ctx.save();
        if (this.screenShake > 0) {
            this.ctx.translate((Math.random() - 0.5) * this.screenShake, (Math.random() - 0.5) * this.screenShake);
            this.screenShake *= 0.9;
        }

        this.ctx.clearRect(0, 0, this.width, this.height);
        
        this.background.draw(this.ctx);
        this.track.draw(this.ctx);
        
        this.entities.forEach(e => e.draw(this.ctx));
        this.particles.forEach(p => p.draw(this.ctx));
        
        this.player.draw(this.ctx);
        this.ctx.restore();

        if (this.state === 'PLAYING' && this.isSlowedDown) {
            this.ctx.fillStyle = 'rgba(255, 105, 180, 0.2)';
            this.ctx.fillRect(0, 0, this.width, this.height);
            this.ctx.fillStyle = 'white';
            this.ctx.font = 'bold 30px Arial';
            this.ctx.textAlign = 'center';
            this.ctx.fillText("Whoops! Sticky!", this.width/2, 100);
        }
    }

    checkCollision(rect1, rect2) {
        // Simplified box collision
        const margin = 10;
        return rect1.x < rect2.x + rect2.width - margin &&
               rect1.x + rect1.width > rect2.x + margin &&
               rect1.y < rect2.y + rect2.height - margin &&
               rect1.y + rect1.height > rect2.y + margin;
    }

    spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            this.particles.push(new Particle(x, y, color));
        }
    }
}

class Player {
    constructor(game) {
        this.game = game;
        this.reset();
        this.width = 60;
        this.height = 70;
        this.animationFrame = 0;
    }

    reset() {
        this.x = 150;
        this.y = 0;
        this.vy = 0;
        this.isGrounded = false;
        this.jumpsLeft = 2;
        this.isGliding = false;
        this.rotation = 0;
    }

    resize() {
        // Scale physics or sizes if needed
    }

    jump() {
        if (this.jumpsLeft > 0) {
            this.vy = (this.jumpsLeft === 2) ? CONFIG.jumpForce : CONFIG.doubleJumpForce;
            this.jumpsLeft--;
            this.isGrounded = false;
            this.isGliding = false;
            this.game.spawnParticles(this.x + this.width/2, this.y + this.height, 'white', 5);
        } else {
            // Start gliding if no jumps left
            this.isGliding = true;
        }
    }

    releaseJump() {
        this.isGliding = false;
    }

    update(dt) {
        // Apply physics with dt-based scaling
        let g = CONFIG.gravity;
        if (this.isGliding && this.vy > 0) {
            g = CONFIG.glideForce;
            this.vy *= 0.95; 
        }
        
        this.vy += g * dt * 60;
        this.y += this.vy * dt * 60;

        // Fall out check
        if (this.y > this.game.height + 100) {
            this.game.gameOver();
        }

        // Ground check against track
        const groundY = this.game.track.getYAt(this.x + this.width/2) - this.height;
        if (this.y > groundY) {
            this.y = groundY;
            this.vy = 0;
            if (!this.isGrounded) {
                this.isGrounded = true;
                this.jumpsLeft = 2;
                this.isGliding = false;
            }
        } else {
            this.isGrounded = false;
        }

        // Animation
        this.animationFrame += dt * (this.game.scrollSpeed * 2);
        this.rotation = Math.sin(this.animationFrame * 0.1) * 0.05;
        if (!this.isGrounded) {
            this.rotation = Math.min(0.5, Math.max(-0.5, this.vy * 0.05));
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.width/2, this.y + this.height/2);
        ctx.rotate(this.rotation);

        // Draw Cart (Cupcake/Candy Apple style)
        const cartColor = this.game.equipped.cart === 'rainbow' ? 
            ctx.createLinearGradient(-35, 0, 35, 0) : this.game.equipped.cart;
        
        if (this.game.equipped.cart === 'rainbow') {
            cartColor.addColorStop(0, 'red');
            cartColor.addColorStop(0.2, 'orange');
            cartColor.addColorStop(0.4, 'yellow');
            cartColor.addColorStop(0.6, 'green');
            cartColor.addColorStop(0.8, 'blue');
            cartColor.addColorStop(1, 'violet');
        }

        ctx.fillStyle = cartColor || '#ff4d4d';
        ctx.beginPath();
        ctx.roundRect(-35, 10, 70, 30, [10]);
        ctx.fill();
        
        // Wheels
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(-20, 40, 10, 0, Math.PI * 2);
        ctx.arc(20, 40, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#888';
        ctx.beginPath();
        ctx.arc(-20, 40, 4, 0, Math.PI * 2);
        ctx.arc(20, 40, 4, 0, Math.PI * 2);
        ctx.fill();

        // Draw Fizz (Purple friendly monster)
        const bounce = Math.sin(this.animationFrame * 0.2) * 5;
        ctx.translate(0, bounce);
        
        // Body
        ctx.fillStyle = '#9370db';
        ctx.beginPath();
        ctx.ellipse(0, 0, 30, 35, 0, 0, Math.PI * 2);
        ctx.fill();

        // Hat
        if (this.game.equipped.hat === 'party') {
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.moveTo(-15, -30);
            ctx.lineTo(0, -60);
            ctx.lineTo(15, -30);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(0, -60, 5, 0, Math.PI * 2);
            ctx.fill();
        } else if (this.game.equipped.hat === 'crown') {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(-20, -30);
            ctx.lineTo(-20, -50);
            ctx.lineTo(-10, -40);
            ctx.lineTo(0, -55);
            ctx.lineTo(10, -40);
            ctx.lineTo(20, -50);
            ctx.lineTo(20, -30);
            ctx.closePath();
            ctx.fill();
        }

        // Eyes (Googly)
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(-12, -10, 10, 0, Math.PI * 2);
        ctx.arc(12, -10, 10, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'black';
        const eyeMotionX = Math.cos(this.animationFrame * 0.1) * 3;
        const eyeMotionY = Math.sin(this.animationFrame * 0.05) * 2;
        ctx.beginPath();
        ctx.arc(-12 + eyeMotionX, -10 + eyeMotionY, 4, 0, Math.PI * 2);
        ctx.arc(12 + eyeMotionX, -10 + eyeMotionY, 4, 0, Math.PI * 2);
        ctx.fill();

        // Mouth
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, 10, 10, 0.2, Math.PI - 0.2);
        ctx.stroke();

        ctx.restore();
    }
}

class Track {
    constructor(game) {
        this.game = game;
        this.reset();
        this.points = [];
        this.generateInitialPoints();
    }

    reset() {
        this.points = [];
        this.offset = 0;
        this.generateInitialPoints();
    }

    generateInitialPoints() {
        this.points = [];
        let x = 0;
        const h = this.game.height || window.innerHeight || 600;
        let y = h * 0.7;
        for (let i = 0; i < 20; i++) {
            this.points.push({ x, y });
            x += 200;
            y += (Math.random() - 0.5) * 150;
            y = Math.min(h * 0.8, Math.max(h * 0.5, y));
        }
    }

    update(dt) {
        const move = this.game.scrollSpeed * 60 * dt;
        this.offset += move;
        
        // Keep points coming
        const lastPoint = this.points[this.points.length - 1];
        if (lastPoint.x - this.offset < this.game.width + 400) {
            const nextX = lastPoint.x + 200;
            let nextY = lastPoint.y + (Math.random() - 0.5) * 150;
            nextY = Math.min(this.game.height * 0.8, Math.max(this.game.height * 0.5, nextY));
            this.points.push({ x: nextX, y: nextY });
        }

        // Remove old points
        if (this.points[0].x - this.offset < -400) {
            this.points.shift();
        }
    }

    getYAt(worldX) {
        const targetX = worldX + this.offset;
        // Find which points targetX falls between
        for (let i = 0; i < this.points.length - 1; i++) {
            const p1 = this.points[i];
            const p2 = this.points[i+1];
            if (targetX >= p1.x && targetX <= p2.x) {
                const t = (targetX - p1.x) / (p2.x - p1.x);
                // Ease function for smooth track
                const easeT = t * t * (3 - 2 * t);
                return p1.y + (p2.y - p1.y) * easeT;
            }
        }
        return this.game.height * 0.7;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(-this.offset, 0);

        // Path (Coaster structure)
        ctx.strokeStyle = CONFIG.colors.trackShadow;
        ctx.lineWidth = 15;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y + 10);
        for (let i = 1; i < this.points.length; i++) {
            const p1 = this.points[i-1];
            const p2 = this.points[i];
            const midX = (p1.x + p2.x) / 2;
            ctx.quadraticCurveTo(p1.x, p1.y + 10, midX, (p1.y + p2.y) / 2 + 10);
        }
        ctx.stroke();

        ctx.strokeStyle = CONFIG.colors.track;
        ctx.lineWidth = 15;
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for (let i = 1; i < this.points.length; i++) {
            const p1 = this.points[i-1];
            const p2 = this.points[i];
            const midX = (p1.x + p2.x) / 2;
            ctx.quadraticCurveTo(p1.x, p1.y, midX, (p1.y + p2.y) / 2);
        }
        ctx.stroke();

        // Support Pillars
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        this.points.forEach(p => {
            if (p.x - this.offset > -100 && p.x - this.offset < this.game.width + 100) {
                ctx.fillRect(p.x - 5, p.y + 10, 10, this.game.height - p.y);
            }
        });

        ctx.restore();
    }
}

class Background {
    constructor(game) {
        this.game = game;
        this.themes = [
            { name: 'Candy Lane', sky: '#87CEEB', accent: '#ff69b4', secondary: '#B0E0E6' },
            { name: 'Gumball Garden', sky: '#E0FFFF', accent: '#32cd32', secondary: '#ADD8E6' },
            { name: 'Cookie Canyon', sky: '#F5DEB3', accent: '#D2691E', secondary: '#F4A460' },
            { name: 'Ice Cream Peak', sky: '#E6E6FA', accent: '#FFB6C1', secondary: '#D8BFD8' },
            { name: 'Cupcake Kingdom', sky: '#FFF0F5', accent: '#DA70D6', secondary: '#EE82EE' }
        ];
        this.currentThemeIndex = 0;
        this.layers = [
            { speed: 0.1, items: [], color: '#B0E0E6' },
            { speed: 0.3, items: [], color: '#ADD8E6' },
            { speed: 0.6, items: [], color: '#87CEFA' }
        ];
        this.initLayers();
    }

    initLayers() {
        this.layers.forEach(layer => {
            layer.items = [];
            for (let i = 0; i < 15; i++) {
                layer.items.push({
                    x: Math.random() * this.game.width * 2,
                    y: Math.random() * this.game.height * 0.8,
                    size: 30 + Math.random() * 100,
                    type: Math.random() > 0.5 ? 'cloud' : 'candy'
                });
            }
        });
    }

    update(dt) {
        const themeIndex = Math.floor(this.game.distance / 500) % this.themes.length;
        if (themeIndex !== this.currentThemeIndex) {
            this.currentThemeIndex = themeIndex;
            // Smoothly change colors maybe? Or just snap for now
        }

        this.layers.forEach(layer => {
            const move = this.game.scrollSpeed * layer.speed;
            layer.items.forEach(item => {
                item.x -= move;
                if (item.x + item.size < 0) {
                    item.x = this.game.width + Math.random() * 200;
                    item.y = Math.random() * this.game.height * 0.8;
                }
            });
        });
    }

    draw(ctx) {
        const theme = this.themes[this.currentThemeIndex];
        
        // Gradient Sky
        const grad = ctx.createLinearGradient(0, 0, 0, this.game.height);
        grad.addColorStop(0, theme.sky);
        grad.addColorStop(1, '#ffffff');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, this.game.width, this.game.height);

        this.layers.forEach((layer, layerIdx) => {
            ctx.fillStyle = layerIdx === 0 ? theme.secondary : theme.accent;
            ctx.globalAlpha = 0.4 + (layerIdx * 0.2);
            layer.items.forEach(item => {
                if (item.type === 'cloud') {
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.size/2, 0, Math.PI*2);
                    ctx.arc(item.x + item.size/3, item.y - item.size/4, item.size/2, 0, Math.PI*2);
                    ctx.arc(item.x + item.size/1.5, item.y, item.size/2, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.fillRect(item.x - 5, item.y, 10, this.game.height - item.y);
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.size/3, 0, Math.PI*2);
                    ctx.fill();
                }
            });
        });
        ctx.globalAlpha = 1.0;
    }
}

class SoundManager {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }

    play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        
        switch(type) {
            case 'jump': this.synth(150, 600, 0.1, 'triangle'); break;
            case 'candy': this.synth(800, 1200, 0.05, 'sine'); break;
            case 'slowdown': this.synth(300, 100, 0.3, 'sawtooth'); break;
            case 'powerup': this.synth(400, 1000, 0.2, 'square'); break;
        }
    }

    synth(f1, f2, dur, type) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f1, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + dur);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + dur);
    }
}

class Entity {
    constructor(game, x, y, type) {
        this.game = game;
        this.x = x;
        this.y = y;
        this.type = type;
        this.width = 50;
        this.height = 50;
        this.phase = Math.random() * Math.PI * 2;
    }

    update(dt) {
        this.x -= this.game.scrollSpeed * 60 * dt;
        this.y += Math.sin(this.game.distance * 0.05 + this.phase) * 1;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + 25, this.y + 25);
        
        if (this.type === 'candy') {
            ctx.rotate(this.game.distance * 0.1);
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.arc(0, 0, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 1.5);
            ctx.stroke();
        } else if (this.type === 'balloon') {
            ctx.fillStyle = '#00bfff';
            ctx.beginPath();
            ctx.ellipse(0, -5, 15, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.beginPath();
            ctx.moveTo(0, 15);
            ctx.lineTo(Math.sin(this.game.distance * 0.1) * 5, 35);
            ctx.stroke();
        } else if (this.type === 'ticket') {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(-20, -12, 40, 24);
            ctx.strokeStyle = '#daa520';
            ctx.strokeRect(-18, -10, 36, 20);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px Arial';
            ctx.fillText("GOLD", -15, 4);
        } else if (this.type === 'obstacle') {
            ctx.fillStyle = '#cc00cc';
            ctx.beginPath();
            ctx.roundRect(-25, -5, 50, 20, [10]);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("STICKY!", 0, 8);
        }
        ctx.restore();
    }

    onCollect() {
        if (this.type === 'candy') {
            this.game.score += 10;
            this.game.candyCount += 1;
            this.game.sound.play('candy');
            this.game.spawnParticles(this.x + 25, this.y + 25, '#ff69b4', 8);
        } else if (this.type === 'balloon') {
            this.game.score += 25;
            this.game.sound.play('powerup');
            this.game.spawnParticles(this.x + 25, this.y + 25, '#00bfff', 15);
        } else if (this.type === 'ticket') {
            this.game.score += 100;
            this.game.sound.play('powerup');
            this.game.spawnParticles(this.x + 25, this.y + 25, '#ffd700', 25);
            // Temporary speed boost
            this.game.scrollSpeed += 5;
        } else if (this.type === 'obstacle') {
            this.game.isSlowedDown = true;
            this.game.slowEffectTimer = 1.5;
            this.game.screenShake = 10;
            this.game.sound.play('slowdown');
            this.game.spawnParticles(this.x + 25, this.y + 25, '#cc00cc', 10);
            localStorage.setItem('fizz_candy', this.game.candyCount);
        }
        // Save progress regularly
        localStorage.setItem('fizz_candy', this.game.candyCount);
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.size = 3 + Math.random() * 5;
    }

    update(dt) {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // gravity
        this.life -= dt * 2;
    }

    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}
